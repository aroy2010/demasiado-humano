{{ $alg := .Site.Params.fingerprintAlgorithm | default "sha512" }}
{{ with resources.Get "js/scroll-header.js" }}
{{ $scrollHeader := . | resources.Minify | resources.Fingerprint $alg }}
<script type="text/javascript" src="{{ $scrollHeader.RelPermalink }}"
    integrity="{{ $scrollHeader.Data.Integrity }}"></script>
{{ end }}
