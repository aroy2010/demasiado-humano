baseURL = 'http://localhost:1313/'
languageCode = 'es-PE'
title = 'AROY1962'
theme = 'PaperMod'

[params]
  author = 'Adriel Olórtegui Yzú'
  description = 'Reflexiones - Disquisiciones - Inquisiciones'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  stickyHeader = false

[params.assets]
  disableHLJS = false
  disableFingerprinting = false  # ← CRÍTICO

[params.homeInfoParams]
  Title = "AROY1962"
  Content = "Blog Adriel Olórtegui Yzú"

  [[menu.main]]
    identifier = "inicio"
    name = "Inicio"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "lecturas"
    name = "Lecturas"
    url = "/lecturas/"
    weight = 20
  [[menu.main]]
    identifier = "escritos"
    name = "Escritura Creativa"
    url = "/escritos_creativos/"
    weight = 30
  [[menu.main]]
    identifier = "acerca"
    name = "Acerca de"
    url = "/posts/"
    weight = 40

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params.profileMode]
    enabled = true
    title = "AROY1962: Medicina, Letras y Sentido"
    subtitle = "Explorando la intersección entre el arte de curar y el oficio de escribir."
    imageUrl = "images/tu-banner-hero.jpg" # Ubicada en static/images/
    imageWidth = 150
    imageHeight = 150
    imageTitle = "Logo AROY1962"
    
    [[params.profileMode.buttons]]
        name = "📖 Empezar a leer"
        url = "posts/"
    [[params.profileMode.buttons]]
        name = "✍️ Sobre mí"
        url = "about/"